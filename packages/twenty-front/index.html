<!doctype html>
<html lang="en" translate="no" class="light">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="icon"
      type="image/png"
      href="/images/icons/android/android-launchericon-48-48.png"
      data-rh="true"
    />
    <link rel="apple-touch-icon" href="/images/icons/ios/180.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://app.myah.dev/" />

    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Myah is a creator operations workspace." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Myah" />
    <meta property="og:title" content="Myah" />
    <meta
      property="og:description"
      content="Myah is a creator operations workspace."
    />
    <meta property="og:url" content="https://app.myah.dev/" />
    <meta
      property="og:image"
      content="https://app.myah.dev/images/brand/myah-social-card.png"
    />
    <meta property="og:image:alt" content="Myah app preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Myah" />
    <meta
      name="twitter:description"
      content="Myah is a creator operations workspace."
    />
    <meta
      name="twitter:image"
      content="https://app.myah.dev/images/brand/myah-social-card.png"
    />
    <meta name="twitter:image:alt" content="Myah app preview" />
    <title>Myah</title>
    <!-- BEGIN: Twenty Config -->
    <script id="twenty-env-config">
      window._env_ = {
        // This will be overwritten
      };
    </script>
    <!-- END: Twenty Config -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module">
      const disableInputAutoZoom = () => {
        const viewportMetadata = document.querySelector('meta[name=viewport]');

        if (viewportMetadata !== null) {
          viewportMetadata.setAttribute(
            'content',
            'width=device-width, initial-scale=1.0, maximum-scale=1.0',
          );
        }
      };

      const isIOS = /iPad|iPhone/.test(navigator.userAgent);
      if (isIOS) {
        disableInputAutoZoom();
      }
    </script>
    <style>
      :root {
        /* THEME_DARK.background.tertiary */
        --theme-dark-background-tertiary: #1d1d1d;
        /* THEME_LIGHT.background.tertiary */
        --theme-light-background-tertiary: #f1f1f1;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: var(--theme-dark-background-tertiary);
        }
      }

      @media (prefers-color-scheme: light) {
        html,
        body {
          background-color: var(--theme-light-background-tertiary);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
