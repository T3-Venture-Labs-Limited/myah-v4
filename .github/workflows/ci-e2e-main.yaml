name: CI E2E Main

on:
  push:
    branches: [main]

  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened]

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref }}-${{
      (github.event_name == 'pull_request' &&
       (github.event.action == 'labeled' || github.event.action == 'unlabeled') &&
       github.event.label.name != 'run-merge-queue' &&
       github.run_id) ||
      'e2e-gate'
    }}
  cancel-in-progress: >-
    ${{
      github.ref != 'refs/heads/main' &&
      (github.event_name != 'pull_request' ||
       (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
       github.event.label.name == 'run-merge-queue')
    }}

jobs:
  select-runner:
    uses: ./.github/workflows/select-runner.yaml
    secrets: inherit

  e2e-test:
    needs: [select-runner]

    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-merge-queue') &&
       github.event.action != 'unlabeled' &&
       (github.event.action != 'labeled' ||
        github.event.label.name == 'run-merge-queue'))
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runs_on) }}
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=10240'
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*

      - name: Reserve isolated application ports
        run: |
          cat > "$RUNNER_TEMP/reserve-port.cjs" <<'NODE'
          const fs = require('node:fs');
          const net = require('node:net');

          const [statePath] = process.argv.slice(2);

          if (!statePath) {
            throw new Error('A reservation state path is required');
          }

          const server = net.createServer();

          server.once('error', (error) => {
            console.error(error);
            process.exit(1);
          });

          server.listen(0, '127.0.0.1', () => {
            const address = server.address();

            if (address === null || typeof address === 'string') {
              throw new Error('Unable to reserve an application port');
            }

            fs.writeFileSync(
              statePath,
              JSON.stringify({ pid: process.pid, port: address.port }),
              { flag: 'wx' },
            );
          });

          const shutdown = () => {
            server.close((error) => {
              if (error) {
                console.error(error);
                process.exit(1);
              }

              process.exit(0);
            });
          };

          process.once('SIGINT', shutdown);
          process.once('SIGTERM', shutdown);
          NODE

          nohup node "$RUNNER_TEMP/reserve-port.cjs" \
            "$RUNNER_TEMP/server-port-reservation.json" \
            > "$RUNNER_TEMP/server-port-reservation.log" 2>&1 &
          nohup node "$RUNNER_TEMP/reserve-port.cjs" \
            "$RUNNER_TEMP/frontend-port-reservation.json" \
            > "$RUNNER_TEMP/frontend-port-reservation.log" 2>&1 &

          if ! timeout 10 bash -c '
            until
              test -s "$RUNNER_TEMP/server-port-reservation.json" &&
              test -s "$RUNNER_TEMP/frontend-port-reservation.json"
            do
              sleep 0.1
            done
          '; then
            cat "$RUNNER_TEMP/server-port-reservation.log"
            cat "$RUNNER_TEMP/frontend-port-reservation.log"
            exit 1
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const readReservation = (name) =>
            JSON.parse(
              fs.readFileSync(
                path.join(
                  process.env.RUNNER_TEMP,
                  `${name}-port-reservation.json`,
                ),
                'utf8',
              ),
            );

          const server = readReservation('server');
          const frontend = readReservation('frontend');

          if (server.port === frontend.port) {
            throw new Error('Application port reservations must be distinct');
          }

          const serverUrl = `http://localhost:${server.port}`;
          const frontendUrl = `http://localhost:${frontend.port}`;

          fs.appendFileSync(
            process.env.GITHUB_ENV,
            [
              `NODE_PORT=${server.port}`,
              `SERVER_URL=${serverUrl}`,
              `REACT_APP_SERVER_BASE_URL=${serverUrl}`,
              `BACKEND_BASE_URL=${serverUrl}`,
              `FRONTEND_URL=${frontendUrl}`,
              `FRONTEND_BASE_URL=${frontendUrl}`,
              `SERVER_PORT_RESERVATION_PID=${server.pid}`,
              `FRONTEND_PORT_RESERVATION_PID=${frontend.pid}`,
            ].join('\n') + '\n',
          );
          NODE

      - name: Install dependencies
        uses: ./.github/actions/yarn-install

      - name: Restore Nx build cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 (restore)
        with:
          key: v4-e2e-build-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            v4-e2e-build-${{ github.ref_name }}-
            v4-e2e-build-main-
          path: |
            .nx
            node_modules/.cache
            packages/*/node_modules/.cache

      - name: Build twenty-shared
        run: npx nx build twenty-shared

      - name: Install Playwright Browsers
        run: npx nx setup twenty-e2e-testing

      - name: Setup environment files
        run: |
          cp packages/twenty-front/.env.example packages/twenty-front/.env
          npx nx reset:env:e2e-testing-server twenty-server
          printf '\nNODE_PORT=%s\nSERVER_URL=%s\nFRONTEND_URL=%s\nIS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS=false\n' \
            "$NODE_PORT" "$SERVER_URL" "$FRONTEND_URL" \
            >> packages/twenty-server/.env

      - name: Build frontend
        run: NODE_ENV=production npx nx build twenty-front

      - name: Inject frontend runtime environment
        working-directory: packages/twenty-front
        run: ./scripts/inject-runtime-env.sh

      - name: Build server
        run: npx nx build twenty-server

      - name: Save Nx build cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 (save)
        with:
          key: v4-e2e-build-${{ github.ref_name }}-${{ github.sha }}
          path: |
            .nx
            node_modules/.cache
            packages/*/node_modules/.cache

      - name: Create and setup database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "default";'
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "test";'
          npx nx run twenty-server:database:reset

      - name: Verify isolated application port reservations
        run: |
          kill -0 "$SERVER_PORT_RESERVATION_PID"
          kill -0 "$FRONTEND_PORT_RESERVATION_PID"

      - name: Start server
        run: |
          kill "$SERVER_PORT_RESERVATION_PID"
          timeout 10 bash -c \
            'while kill -0 "$SERVER_PORT_RESERVATION_PID" 2>/dev/null; do sleep 0.1; done'
          echo 'SERVER_PORT_RESERVATION_PID=' >> "$GITHUB_ENV"

          nohup npx nx run twenty-server:start:ci > "$RUNNER_TEMP/twenty-server.log" 2>&1 &
          echo "Waiting for server to be ready..."
          if ! timeout 60 bash -c 'until curl --fail --silent --show-error "$SERVER_URL/healthz"; do sleep 2; done'; then
            cat "$RUNNER_TEMP/twenty-server.log"
            exit 1
          fi

      - name: Start frontend
        run: |
          kill "$FRONTEND_PORT_RESERVATION_PID"
          timeout 10 bash -c \
            'while kill -0 "$FRONTEND_PORT_RESERVATION_PID" 2>/dev/null; do sleep 0.1; done'
          echo 'FRONTEND_PORT_RESERVATION_PID=' >> "$GITHUB_ENV"

          npm_config_yes=true nohup npx serve -s packages/twenty-front/build --listen "tcp://127.0.0.1:${FRONTEND_BASE_URL##*:}" > "$RUNNER_TEMP/twenty-front.log" 2>&1 &
          echo "Waiting for frontend to be ready..."
          if ! timeout 60 bash -c 'until curl --fail --silent --show-error "$FRONTEND_BASE_URL"; do sleep 2; done'; then
            cat "$RUNNER_TEMP/twenty-front.log"
            exit 1
          fi

      - name: Start worker
        run: |
          nohup npx nx run twenty-server:worker > "$RUNNER_TEMP/twenty-worker.log" 2>&1 &
          echo "Worker started"

      - name: Run Playwright tests
        run: |
          curl --fail --silent --show-error "$SERVER_URL/healthz"
          curl --fail --silent --show-error "$FRONTEND_BASE_URL" > /dev/null
          npx nx test twenty-e2e-testing

      - name: Release application port reservations
        if: always()
        run: |
          for pid in \
            "${SERVER_PORT_RESERVATION_PID:-}" \
            "${FRONTEND_PORT_RESERVATION_PID:-}"
          do
            if test -n "$pid" && kill -0 "$pid" 2>/dev/null; then
              kill "$pid"
            fi
          done

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-results
          path: |
            packages/twenty-e2e-testing/run_results/
            packages/twenty-e2e-testing/test-results/
          retention-days: 7

  ci-e2e-main-status-check:
    name: >-
      ${{
        (github.event_name == 'pull_request' &&
         (github.event.action == 'unlabeled' ||
          (github.event.action == 'labeled' &&
           github.event.label.name != 'run-merge-queue')) &&
         format('ci-e2e-main-non-gate-{0}', github.run_id)) ||
        'ci-e2e-main-status-check'
      }}
    if: always() && !cancelled()
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [e2e-test, select-runner]
    steps:
      - name: Fail job if any needs failed
        if: contains(needs.*.result, 'failure') || needs.select-runner.result != 'success'
        run: exit 1

  notify-main-ci-failure:
    if: always() && github.event_name == 'push' && contains(needs.*.result, 'failure')
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [e2e-test]
    steps:
      - name: Ping engineering on main CI failure
        run: |
          curl -fsS -X POST https://engineering.twenty.com/s/main-ci-failing \
            -H 'Content-Type: application/json' \
            -d '{
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
