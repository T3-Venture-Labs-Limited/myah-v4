name: Deploy Twenty App
description: Build and deploy a Twenty app to a remote instance

inputs:
  api-url:
    description: Base URL of the target Twenty instance (e.g. https://my.twenty.instance)
    required: true
  api-key:
    description: API key or access token for the target instance
    required: true
  app-path:
    description: Path to the app directory (relative to repo root). Defaults to repo root.
    required: false
    default: '.'
  workspace-path:
    description: Path containing the Node.js and Yarn workspace. Defaults to repo root.
    required: false
    default: '.'
  allow-existing-version:
    description: Treat an already published identical package version as a successful publish.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: '${{ inputs.workspace-path }}/.nvmrc'
        cache: yarn
        cache-dependency-path: '${{ inputs.workspace-path }}/yarn.lock'

    - name: Install app dependencies
      shell: bash
      working-directory: ${{ inputs.app-path }}
      run: yarn install --immutable

    - name: Configure remote
      shell: bash
      run: |
        mkdir -p ~/.twenty
        node -e "
          const fs = require('fs'), path = require('path'), os = require('os');
          fs.writeFileSync(path.join(os.homedir(), '.twenty', 'config.json'), JSON.stringify({
            version: 1,
            remotes: { target: { apiUrl: process.env.API_URL, apiKey: process.env.API_KEY } }
          }, null, 2));
        "
      env:
        API_URL: ${{ inputs.api-url }}
        API_KEY: ${{ inputs.api-key }}

    - name: Deploy
      shell: bash
      working-directory: ${{ inputs.app-path }}
      env:
        ALLOW_EXISTING_VERSION: ${{ inputs.allow-existing-version }}
      run: |
        set +e
        output="$(yarn twenty app:publish --private --remote target 2>&1)"
        status=$?
        set -e
        printf '%s\n' "$output"

        if [ "$status" -eq 0 ]; then
          exit 0
        fi

        version="$(node -p "require('./package.json').version")"

        if [ "$ALLOW_EXISTING_VERSION" = 'true' ] &&
          printf '%s\n' "$output" |
            grep -Fq "version must be higher than the currently deployed version ${version}."; then
          echo "Package version ${version} is already published; continuing to promotion."
          exit 0
        fi

        exit "$status"
